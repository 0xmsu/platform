commands:
  build: cargo build --release
  test: cargo test
  clippy: cargo clippy -- -D warnings
  fmt: cargo fmt
  check: cargo check
  mine: cargo run --release -- swe mine
  harness: cargo run --release -- swe harness
  validate: cargo run --release -- swe load

services:
  docker:
    start: sudo systemctl start docker || true
    stop: sudo systemctl stop docker || true
    healthcheck: docker info
    port: 0
    depends_on: []

environment:
  required:
    - OPENROUTER_API_KEY
    - GITHUB_TOKEN
    - HF_TOKEN
  optional:
    - RUST_LOG
    - DOCKER_AGENT_DIR
